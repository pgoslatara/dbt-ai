---
name: AI PR Description

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  describe:
    name: Generate PR Description
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate PR description
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          prompt: |-
            Analyze the diff for this PR and write a business-friendly summary.
            Output ONLY the markdown content below, nothing else:
            ## AI PR Description
            ### Summary
            Brief overview of what changed and why.

            ### dbt Model Changes
            List any new, modified, or removed models with their layer (staging/intermediate/marts).
            If no dbt models were changed, write "No dbt model changes."

            ### Test Coverage
            Note any new tests added or testing gaps.

            ### Impact
            Describe downstream impact on other models or dashboards.
            Keep it concise and focused on business value, not implementation details.
      - name: Post AI description comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CLAUDE_OUTPUT: ${{ steps.claude.outputs.result }}
        run: |-
          # Delete any previous AI PR Description comments to keep one per push
          COMMENT_IDS=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --jq '[.[] | select(.body | contains("AI PR Description")) | .id] | .[]')
          for CID in $COMMENT_IDS; do
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/issues/comments/${CID}" || true
          done

          # Try to extract Claude's description from the output
          if echo "$CLAUDE_OUTPUT" | grep -q "AI PR Description"; then
            echo "$CLAUDE_OUTPUT" | sed -n '/## AI PR Description/,$ p' | gh pr comment "$PR_NUMBER" --body-file -
          else
            # Fallback: generate a basic description from the diff
            DIFF_STAT=$(git diff origin/main...HEAD --stat | tail -1)
            FILES=$(git diff origin/main...HEAD --name-only | head -20)
            BODY="## AI PR Description"
            BODY="${BODY}\n\n### Summary\nThis PR modifies the following files:\n"
            while IFS= read -r f; do
              BODY="${BODY}\n- \`${f}\`"
            done <<< "$FILES"
            BODY="${BODY}\n\n**Diff stats:** ${DIFF_STAT}"
            BODY="${BODY}\n\n---\n*Auto-generated fallback — Claude analysis was not available.*"
            printf '%b' "$BODY" | gh pr comment "$PR_NUMBER" --body-file -
          fi
