---
models:
  - name: int_stations_unioned
    description: >
      Union of all bikeshare stations across cities (Austin and NYC)
      with a standardized schema.
    columns:
      - name: station_id
        description: Unique identifier for the station (unique within a city)
        tests:
          - not_null
      - name: city
        description: City where the station is located
        tests:
          - not_null
          - accepted_values:
              values:
                - austin
                - new_york
      - name: city_full_name
        description: Full display name of the city
        tests:
          - not_null
      - name: latitude
        description: Latitude coordinate of the station
        tests:
          - not_null
      - name: longitude
        description: Longitude coordinate of the station
        tests:
          - not_null
      - name: station_name
        description: Human-readable name of the station
        tests:
          - not_null
      - name: timezone
        description: IANA timezone identifier for the city
        tests:
          - not_null
  - name: int_trip_metrics_by_station
    description: >
      Aggregated trip counts and average durations per station and city.
    columns:
      - name: station_id
        description: Unique identifier for the station
        tests:
          - not_null
      - name: avg_trip_duration_minutes
        description: Average trip duration in minutes for trips starting at this station
        tests:
          - not_null
      - name: city
        description: City where the station is located
        tests:
          - not_null
      - name: total_trips
        description: Total number of trips starting at this station
        tests:
          - not_null
  - name: int_trips_unioned
    description: >
      Union of all bikeshare trips across cities (Austin and NYC)
      with a standardized schema.
    columns:
      - name: trip_id
        description: Unique identifier for the trip
        tests:
          - not_null
      - name: city
        description: City where the trip occurred
        tests:
          - not_null
          - accepted_values:
              values:
                - austin
                - new_york
      - name: duration_minutes
        description: Duration of the trip in minutes
        tests:
          - not_null:
              config:
                severity: warn
      - name: end_station_id
        description: Station where the trip ended
        tests:
          - not_null:
              config:
                severity: warn
      - name: ended_at
        description: Timestamp when the trip ended
        tests:
          - not_null:
              config:
                severity: warn
      - name: start_station_id
        description: Station where the trip started
        tests:
          - not_null:
              config:
                severity: warn
      - name: started_at
        description: Timestamp when the trip started
        tests:
          - not_null:
              config:
                severity: warn
