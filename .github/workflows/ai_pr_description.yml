---
name: AI PR Description

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  describe:
    name: Generate PR Description
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate PR description
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |-
            Analyze the diff for this PR and post a comment with a business-friendly summary.
            Structure your comment as:
            ## AI PR Description
            ### Summary
            Brief overview of what changed and why.

            ### dbt Model Changes
            List any new, modified, or removed models with their layer (staging/intermediate/marts).
            If no dbt models were changed, write "No dbt model changes."

            ### Test Coverage
            Note any new tests added or testing gaps.

            ### Impact
            Describe downstream impact on other models or dashboards.
            Keep it concise and focused on business value, not implementation details.
      - name: Post description summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |-
          EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --jq '[.[] | select(.body | contains("AI PR Description"))] | length')
          if [ "$EXISTING" = "0" ]; then
            BODY="## AI PR Description"
            BODY="${BODY}\n\nNo description generated. Claude was unable to analyze this PR."
            printf '%b' "$BODY" | gh pr comment "$PR_NUMBER" --body-file -
          fi
