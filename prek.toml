[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"

[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=1024"]

[[repos.hooks]]
id = "check-merge-conflict"

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "detect-private-key"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "dbt-bouncer"
name = "dbt-bouncer"
entry = "uv run dbt-bouncer --only manifest_checks"
language = "system"
pass_filenames = false
types = ["yaml", "sql"]

[[repos.hooks]]
id = "ruff-check"
name = "ruff-check"
entry = "uv run ruff check --fix"
language = "system"
types = ["python"]

[[repos.hooks]]
id = "ruff-format"
name = "ruff-format"
entry = "uv run ruff format"
language = "system"
types = ["python"]

[[repos.hooks]]
id = "rumdl"
name = "rumdl"
entry = "uv run rumdl check"
language = "system"
types = ["markdown"]
exclude = '\.claude/commands/'

[[repos.hooks]]
id = "sqlfmt"
name = "sqlfmt"
entry = "uv run sqlfmt"
language = "system"
types = ["sql"]

[[repos.hooks]]
id = "ty"
name = "ty"
entry = "uv run ty check"
language = "system"
pass_filenames = false
types = ["python"]

[[repos.hooks]]
id = "yamlfix"
name = "yamlfix"
entry = "uv run yamlfix"
language = "system"
types = ["yaml"]
