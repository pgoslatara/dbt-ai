---
name: Pre-commit Autoupdate

on:
  schedule:
    - cron: 0 6 * * 1
  workflow_dispatch:

jobs:
  autoupdate:
    name: Update pre-commit hooks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Setup Python
        run: uv python install
      - name: Run pre-commit autoupdate
        run: uvx pre-commit autoupdate
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/pre-commit-autoupdate
          commit-message: 'chore: update pre-commit hook versions'
          labels: dependencies
          title: 'chore: update pre-commit hook versions'
          body: |-
            Automated pre-commit hook version updates via `pre-commit autoupdate`.
            Generated by the [Pre-commit Autoupdate](.github/workflows/pre_commit_autoupdate.yml) workflow.
