manifest_checks:
  - name: check_model_has_contracts_enforced
    include: "^models/marts"

  - name: check_model_has_description
    include: "^models"

  - name: check_model_has_tests
    include: "^models"
    min_number_of_tests: 1

  - name: check_model_names
    include: "^models/intermediate"
    model_name_pattern: "^int_"

  - name: check_model_names
    include: "^models/marts"
    model_name_pattern: "^(dim_|fct_)"

  - name: check_model_names
    include: "^models/staging"
    model_name_pattern: "^stg_"

  - name: check_source_has_description
    include: "^models"

  - name: check_source_has_freshness
    include: "^models"

  - name: check_source_has_loader
    include: "^models"

run_results_checks:
  - name: check_run_results_max_execution_time
    max_execution_time_seconds: 300

  - name: check_run_results_max_gigabytes_billed
    max_gigabytes_billed: 10
