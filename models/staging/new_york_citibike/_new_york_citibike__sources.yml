---
sources:
  - name: new_york_citibike
    database: bigquery-public-data
    # This public dataset is only partially updated by Google.
    # citibike_stations: actively updated, citibike_trips: last data 2018-05-31.
    description: NYC Citi Bike bikeshare public dataset
    loader: bigquery_public_datasets
    schema: new_york_citibike
    tables:
      - name: citibike_stations
        description: Station location and capacity information for NYC Citi Bike stations
        columns:
          - name: station_id
            description: Unique identifier for the station
      - name: citibike_trips
        description: Individual trip records for NYC Citi Bike bikeshare
        columns:
          - name: bikeid
            description: Unique identifier for the bike used
