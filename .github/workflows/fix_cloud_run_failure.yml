---
name: Fix Cloud Run Failure

on:
  repository_dispatch:
    types:
      - cloud_run_failure
  workflow_dispatch:
    inputs:
      execution_name:
        description: Cloud Run execution name (e.g., dbt-ai-build-xxxxx)
        required: false
      trigger_source:
        description: What triggered this workflow
        required: false
        default: manual

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west4

jobs:
  fix:
    name: Analyze Failure and Create Fix PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Resolve execution name
        id: resolve
        run: |
          EXEC_NAME="${{ github.event.inputs.execution_name || github.event.client_payload.execution_name || '' }}"
          if [ -z "$EXEC_NAME" ]; then
            echo "No execution name provided, finding latest failed execution..."
            EXEC_NAME=$(gcloud run jobs executions list \
              --job=dbt-ai-build \
              --region="${{ env.REGION }}" \
              --filter="status.conditions[0].type!=Completed" \
              --sort-by="~createTime" \
              --limit=1 \
              --format="value(metadata.name)" \
              2>/dev/null) || true
          fi
          if [ -z "$EXEC_NAME" ]; then
            echo "No failed execution found."
            exit 0
          fi
          echo "execution_name=$EXEC_NAME" >> "$GITHUB_OUTPUT"
          echo "Found failed execution: $EXEC_NAME"
      - name: Pull Cloud Run logs
        if: steps.resolve.outputs.execution_name
        id: logs
        run: |
          EXEC_NAME="${{ steps.resolve.outputs.execution_name }}"

          # Get execution details
          gcloud run jobs executions describe "$EXEC_NAME" \
            --region="${{ env.REGION }}" \
            --format=yaml > /tmp/execution_details.txt 2>&1 || true

          # Get logs from Cloud Logging
          gcloud logging read \
            "resource.type=cloud_run_job AND resource.labels.job_name=dbt-ai-build AND labels.\"run.googleapis.com/execution_name\"=$EXEC_NAME" \
            --limit=200 \
            --format="table(timestamp,textPayload)" \
            --project="${{ env.GCP_PROJECT }}" \
            > /tmp/execution_logs.txt 2>&1 || true
          {
            echo "=== Execution Details ==="
            cat /tmp/execution_details.txt
            echo ""
            echo "=== Execution Logs ==="
            cat /tmp/execution_logs.txt
          } > /tmp/full_context.txt

          # Pass logs via env file (YAML with: blocks don't execute shell substitutions)
          {
            echo "CLOUD_RUN_LOGS<<LOGS_EOF"
            head -500 /tmp/full_context.txt
            echo "LOGS_EOF"
          } >> "$GITHUB_ENV"
      - name: Create fix with Claude
        if: steps.resolve.outputs.execution_name
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --allowedTools bash computer edit read grep glob write
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |-
            A Cloud Run Job execution of our dbt project has failed.
            Execution: ${{ steps.resolve.outputs.execution_name }}
            Here are the execution details and logs:
            ${{ env.CLOUD_RUN_LOGS }}
            IMPORTANT — check the logs above first:
            - If the "Execution Logs" section contains "PERMISSION_DENIED" or is
              empty, you do NOT have enough information to diagnose the failure.
              Skip straight to creating a GitHub issue (see step 2 below).
            - Do NOT spend time exploring the codebase trying to guess the root
              cause when logs are unavailable.
            Your task:
            1. If dbt error logs ARE available, analyze them to identify the root
               cause, determine which model(s) or configuration caused the failure,
               create a fix, and open a PR:
               - Branch name: fix/cloud-run-${{ github.run_id }}
               - PR body: summary of failure, what was changed, how to verify
            2. If dbt error logs are NOT available (permission denied, empty, or
               only execution metadata with no dbt output), create a GitHub issue
               immediately using `gh issue create` with:
               - Title: "Cloud Run dbt build failed — <execution name>"
               - Body: the execution details you do have, a note that logs were
                 unavailable, and a link to this workflow run:
                 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
               - Labels: bug
               Then stop — do not attempt further diagnosis.
