---
sources:
  - name: austin_bikeshare
    database: bigquery-public-data
    # This public dataset is no longer updated by Google. Latest data:
    # bikeshare_stations: 2022-03-04, bikeshare_trips: 2024-06-30.
    description: Austin B-cycle bikeshare public dataset
    loader: bigquery_public_datasets
    schema: austin_bikeshare
    tables:
      - name: bikeshare_stations
        description: Station location and capacity information for Austin B-cycle stations
        columns:
          - name: station_id
            description: Unique identifier for the station
      - name: bikeshare_trips
        description: >
          Individual trip records for Austin B-cycle bikeshare. Note: the source
          contains duplicate trip_id values (189,172 observed as of 2024-06-30);
          deduplication is applied at the staging layer.
        columns:
          - name: trip_id
            description: Trip identifier (not unique in source; deduplicated in staging)
