---
name: Fix CI Failure

on:
  workflow_run:
    workflows:
      - CI Pipeline
    types:
      - completed

jobs:
  analyze:
    name: Analyze CI Failure and Comment on PR
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Try commit SHA first
          PR_NUMBER=$(gh api \
            "repos/${{ github.repository }}/commits/${HEAD_SHA}/pulls" \
            --jq '.[0].number // empty' 2>/dev/null || true)

          # Fall back to branch name lookup (handles force pushes)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --head "$HEAD_BRANCH" --json number \
              --jq '.[0].number // empty' 2>/dev/null || true)
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for this commit."
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER"
      - name: Fetch failed logs
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          gh run view "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --log-failed > /tmp/ci_failed_logs.txt 2>&1 || true

          # Truncate to avoid token limits
          {
            echo "CI_FAILED_LOGS<<LOGS_EOF"
            tail -300 /tmp/ci_failed_logs.txt
            echo "LOGS_EOF"
          } >> "$GITHUB_ENV"
      - name: Analyze with Claude
        if: steps.pr.outputs.number
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-opus-4-6
          claude_args: --allowedTools 'Bash(git diff*),Bash(git log*),Bash(git show*),Read,Glob,Grep,Write'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |-
            The CI pipeline failed on PR  #${{ steps.pr.outputs.number }} in this dbt project.
            Failed CI logs (last 300 lines):
            ${{ env.CI_FAILED_LOGS }}
            Analyze the failure and write your analysis to `/tmp/ci-failure-comment.md` using the Write tool.
            The file must start with the exact string `<!-- ci-failure-marker -->`.
            Use this template:
            <!-- ci-failure-marker -->
            ## 🔴 CI Failure Analysis

            ### Root Cause
            What failed and why — name the specific step, model, or test.

            ### Suggested Fix
            Concrete code changes to resolve the issue.

            ### Commands to Verify
            What the developer should run locally to confirm the fix.
            ---
            *Generated by [Claude Code](https://github.com/anthropics/claude-code-action)*
            Be concise and actionable. Do NOT create a branch or PR — only write the file.
      - name: Post or update failure comment
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |-
          COMMENT_FILE="/tmp/ci-failure-comment.md"

          # Generate fallback if Claude didn't write the file
          if [ ! -s "$COMMENT_FILE" ] || ! grep -q "ci-failure-marker" "$COMMENT_FILE"; then
            {
              echo "<!-- ci-failure-marker -->"
              echo "## 🔴 CI Failure Analysis"
              echo ""
              echo "> Auto-generated fallback — Claude analysis was not available."
              echo ""
              echo "The CI pipeline failed. Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}) for details."
            } > "$COMMENT_FILE"
          fi

          # Upsert: update existing comment or create new one
          MARKER="ci-failure-marker"
          COMMENT_IDS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"${MARKER}\")) | .id]")
          FIRST_ID=$(echo "$COMMENT_IDS" | jq -r 'first // empty')
          REST_IDS=$(echo "$COMMENT_IDS" | jq -r '.[1:] | .[]')
          if [ -n "$FIRST_ID" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${FIRST_ID}" \
              -f body="$(cat "$COMMENT_FILE")"
            for CID in $REST_IDS; do
              gh api -X DELETE "repos/${{ github.repository }}/issues/comments/${CID}" || true
            done
          else
            gh pr comment "$PR_NUMBER" --body-file "$COMMENT_FILE"
          fi
