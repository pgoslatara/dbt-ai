---
name: Weekly Abandoned Models Check

on:
  schedule:
    - cron: 0 8 * * 1
  workflow_dispatch:

jobs:
  check:
    name: Find Abandoned Models
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Setup Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Find abandoned models
        id: abandoned
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          uv run python scripts/find_abandoned_models.py | tee abandoned_report.txt
          echo ""
          echo "=== Report contents ==="
          cat abandoned_report.txt
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          cat abandoned_report.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create GitHub issue
        if: contains(steps.abandoned.outputs.report, 'DROP')
        uses: peter-evans/create-issue-from-file@v6
        with:
          content-filepath: abandoned_report.txt
          labels: automated,cleanup
          title: 'Weekly: Abandoned BigQuery models detected'
