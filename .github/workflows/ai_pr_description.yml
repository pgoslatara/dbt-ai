name: AI PR Description

on:
  pull_request:
    types: [opened]

jobs:
  describe:
    name: Generate PR Description
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR description
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Analyze the diff for this PR and update the PR description with a business-friendly summary.

            Structure:
            ## Summary
            Brief overview of what changed and why.

            ## dbt Model Changes
            List any new, modified, or removed models with their layer (staging/intermediate/marts).

            ## Test Coverage
            Note any new tests added or testing gaps.

            ## Impact
            Describe downstream impact on other models or dashboards.

            Keep it concise and focused on business value, not implementation details.
            Update the PR description using gh pr edit.
