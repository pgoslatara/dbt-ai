name: CD Pipeline

on:
  push:
    branches: [main]

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west4

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/dbt-ai/dbt-ai:${{ github.sha }}

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs update dbt-ai-build \
            --image="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/dbt-ai/dbt-ai:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --task-timeout=1800 \
            --max-retries=1 \
            2>/dev/null \
          || gcloud run jobs create dbt-ai-build \
            --image="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/dbt-ai/dbt-ai:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --task-timeout=1800 \
            --max-retries=1
