models:
  - name: dim_stations
    description: >
      Dimension table of all bikeshare stations across cities,
      enriched with trip metrics.
    config:
      contract:
        enforced: true
    columns:
      - name: station_id
        data_type: STRING
        description: Unique identifier for the station
        tests:
          - not_null

      - name: avg_trip_duration_minutes
        data_type: FLOAT64
        description: Average trip duration in minutes for trips starting at this station
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: city
        data_type: STRING
        description: City where the station is located
        tests:
          - not_null
          - accepted_values:
              values: ["austin", "new_york"]

      - name: city_full_name
        data_type: STRING
        description: Full display name of the city
        tests:
          - not_null

      - name: latitude
        data_type: FLOAT64
        description: Latitude coordinate of the station
        tests:
          - not_null

      - name: longitude
        data_type: FLOAT64
        description: Longitude coordinate of the station
        tests:
          - not_null

      - name: station_name
        data_type: STRING
        description: Human-readable name of the station
        tests:
          - not_null

      - name: timezone
        data_type: STRING
        description: IANA timezone identifier for the city
        tests:
          - not_null

      - name: total_trips
        data_type: INT64
        description: Total number of trips starting at this station
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

  - name: fct_daily_station_metrics
    description: >
      Daily aggregated metrics per station, built incrementally.
    config:
      contract:
        enforced: true
    columns:
      - name: station_id
        data_type: STRING
        description: Unique identifier for the station
        tests:
          - not_null

      - name: avg_trip_duration_minutes
        data_type: FLOAT64
        description: Average trip duration in minutes for the day
        tests:
          - not_null

      - name: city
        data_type: STRING
        description: City where the station is located
        tests:
          - not_null

      - name: metric_date
        data_type: DATE
        description: The date for these metrics
        tests:
          - not_null

      - name: total_trips
        data_type: INT64
        description: Total number of trips for the day
        tests:
          - not_null

  - name: fct_trips
    description: >
      Fact table of all bikeshare trips with computed columns
      for analysis.
    config:
      contract:
        enforced: true
    columns:
      - name: trip_id
        data_type: STRING
        description: Unique identifier for the trip
        tests:
          - not_null
          - unique

      - name: city
        data_type: STRING
        description: City where the trip occurred
        tests:
          - not_null

      - name: day_of_week
        data_type: INT64
        description: Day of the week (1=Sunday, 7=Saturday)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 7

      - name: end_station_id
        data_type: STRING
        description: Station where the trip ended
        tests:
          - not_null

      - name: ended_at
        data_type: TIMESTAMP
        description: Timestamp when the trip ended
        tests:
          - not_null

      - name: is_round_trip
        data_type: BOOLEAN
        description: Whether the trip started and ended at the same station
        tests:
          - not_null

      - name: is_weekend
        data_type: BOOLEAN
        description: Whether the trip occurred on a weekend
        tests:
          - not_null

      - name: start_station_id
        data_type: STRING
        description: Station where the trip started
        tests:
          - not_null

      - name: started_at
        data_type: TIMESTAMP
        description: Timestamp when the trip started
        tests:
          - not_null

      - name: trip_duration_minutes
        data_type: FLOAT64
        description: Duration of the trip in minutes
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

unit_tests:
  - name: test_daily_metrics_aggregation
    description: Daily metrics correctly aggregate trips per station per day
    model: fct_daily_station_metrics
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('int_trips_unioned')
        rows:
          - {trip_id: "t1", city: "austin", duration_minutes: 10.0, end_station_id: "s2", ended_at: "2024-01-01 10:10:00", start_station_id: "s1", started_at: "2024-01-01 10:00:00"}
          - {trip_id: "t2", city: "austin", duration_minutes: 20.0, end_station_id: "s2", ended_at: "2024-01-01 10:30:00", start_station_id: "s1", started_at: "2024-01-01 10:10:00"}
          - {trip_id: "t3", city: "austin", duration_minutes: 30.0, end_station_id: "s2", ended_at: "2024-01-01 11:00:00", start_station_id: "s1", started_at: "2024-01-01 10:30:00"}
    expect:
      rows:
        - {station_id: "s1", city: "austin", metric_date: "2024-01-01", total_trips: 3, avg_trip_duration_minutes: 20.0}

  - name: test_day_of_week_extraction
    description: Verify day_of_week is correctly extracted from started_at
    model: fct_trips
    given:
      - input: ref('int_trips_unioned')
        rows:
          - {trip_id: "t1", city: "austin", duration_minutes: 15.0, end_station_id: "s2", ended_at: "2024-01-03 10:15:00", start_station_id: "s1", started_at: "2024-01-03 10:00:00"}
    expect:
      rows:
        - {trip_id: "t1", day_of_week: 4}

  - name: test_is_round_trip_false
    description: Trip with different start and end stations is not a round trip
    model: fct_trips
    given:
      - input: ref('int_trips_unioned')
        rows:
          - {trip_id: "t1", city: "austin", duration_minutes: 10.0, end_station_id: "s2", ended_at: "2024-01-01 10:10:00", start_station_id: "s1", started_at: "2024-01-01 10:00:00"}
    expect:
      rows:
        - {trip_id: "t1", is_round_trip: false}

  - name: test_is_round_trip_true
    description: Trip with same start and end station is a round trip
    model: fct_trips
    given:
      - input: ref('int_trips_unioned')
        rows:
          - {trip_id: "t1", city: "austin", duration_minutes: 10.0, end_station_id: "s1", ended_at: "2024-01-01 10:10:00", start_station_id: "s1", started_at: "2024-01-01 10:00:00"}
    expect:
      rows:
        - {trip_id: "t1", is_round_trip: true}

  - name: test_is_weekend_saturday
    description: Trip on Saturday (day 7) is flagged as weekend
    model: fct_trips
    given:
      - input: ref('int_trips_unioned')
        rows:
          - {trip_id: "t1", city: "austin", duration_minutes: 10.0, end_station_id: "s2", ended_at: "2024-01-06 10:10:00", start_station_id: "s1", started_at: "2024-01-06 10:00:00"}
    expect:
      rows:
        - {trip_id: "t1", is_weekend: true}

  - name: test_is_weekend_weekday
    description: Trip on Wednesday is not flagged as weekend
    model: fct_trips
    given:
      - input: ref('int_trips_unioned')
        rows:
          - {trip_id: "t1", city: "austin", duration_minutes: 10.0, end_station_id: "s2", ended_at: "2024-01-03 10:10:00", start_station_id: "s1", started_at: "2024-01-03 10:00:00"}
    expect:
      rows:
        - {trip_id: "t1", is_weekend: false}

  - name: test_trip_duration_passthrough
    description: Duration minutes is passed through from upstream
    model: fct_trips
    given:
      - input: ref('int_trips_unioned')
        rows:
          - {trip_id: "t1", city: "austin", duration_minutes: 25.5, end_station_id: "s2", ended_at: "2024-01-01 10:25:30", start_station_id: "s1", started_at: "2024-01-01 10:00:00"}
    expect:
      rows:
        - {trip_id: "t1", trip_duration_minutes: 25.5}
