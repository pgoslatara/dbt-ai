---
name: Fix Cloud Run Failure

on:
  repository_dispatch:
    types:
      - cloud_run_failure
  workflow_dispatch:
    inputs:
      execution_name:
        description: Cloud Run execution name (e.g., dbt-ai-build-xxxxx)
        required: false
      trigger_source:
        description: What triggered this workflow
        required: false
        default: manual

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west4

jobs:
  fix:
    name: Analyze Failure and Create Fix PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Resolve execution name
        id: resolve
        run: |
          EXEC_NAME="${{ github.event.inputs.execution_name || github.event.client_payload.execution_name || '' }}"
          if [ -z "$EXEC_NAME" ]; then
            echo "No execution name provided, finding latest failed execution..."
            EXEC_NAME=$(gcloud run jobs executions list \
              --job=dbt-ai-build \
              --region="${{ env.REGION }}" \
              --filter="status.conditions[0].type!=Completed" \
              --sort-by="~createTime" \
              --limit=1 \
              --format="value(metadata.name)" \
              2>/dev/null) || true
          fi
          if [ -z "$EXEC_NAME" ]; then
            echo "No failed execution found."
            exit 0
          fi
          echo "execution_name=$EXEC_NAME" >> "$GITHUB_OUTPUT"
          echo "Found failed execution: $EXEC_NAME"
      - name: Pull Cloud Run logs
        if: steps.resolve.outputs.execution_name
        id: logs
        run: |
          EXEC_NAME="${{ steps.resolve.outputs.execution_name }}"

          # Get execution details
          gcloud run jobs executions describe "$EXEC_NAME" \
            --region="${{ env.REGION }}" \
            --format=yaml > /tmp/execution_details.txt 2>&1 || true

          # Get logs from Cloud Logging
          LOGS_AVAILABLE=true
          gcloud logging read \
            "resource.type=cloud_run_job AND resource.labels.job_name=dbt-ai-build AND labels.\"run.googleapis.com/execution_name\"=$EXEC_NAME" \
            --limit=200 \
            --format="table(timestamp,textPayload)" \
            --project="${{ env.GCP_PROJECT }}" \
            > /tmp/execution_logs.txt 2>&1 || LOGS_AVAILABLE=false

          # Also mark as unavailable if gcloud returned an error message instead of logs
          if grep -q "PERMISSION_DENIED" /tmp/execution_logs.txt 2>/dev/null; then
            LOGS_AVAILABLE=false
          fi
          echo "logs_available=$LOGS_AVAILABLE" >> "$GITHUB_OUTPUT"
          {
            echo "=== Execution Details ==="
            cat /tmp/execution_details.txt
            echo ""
            echo "=== Execution Logs ==="
            cat /tmp/execution_logs.txt
          } > /tmp/full_context.txt

          # Pass logs via env file (YAML with: blocks don't execute shell substitutions)
          {
            echo "CLOUD_RUN_LOGS<<LOGS_EOF"
            head -500 /tmp/full_context.txt
            echo "LOGS_EOF"
          } >> "$GITHUB_ENV"
      - name: Create issue (logs unavailable)
        if: steps.resolve.outputs.execution_name && steps.logs.outputs.logs_available == 'false'
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXEC_NAME: ${{ steps.resolve.outputs.execution_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "Cloud Run dbt build failed — $EXEC_NAME" \
            --body "$(cat <<ISSUE_EOF
          ## Cloud Run Job Failure
          **Execution:** \`$EXEC_NAME\`
          **Workflow run:** $RUN_URL

          ### Execution Details
          \`\`\`
          $(head -100 /tmp/execution_details.txt)
          \`\`\`

          ### Note
          Cloud Run logs were unavailable (PERMISSION_DENIED), so the root cause
          could not be determined automatically. Check the
          [Cloud Run logs console](https://console.cloud.google.com/run/jobs/details/${{ env.REGION }}/dbt-ai-build/executions?project=${{ env.GCP_PROJECT }})
          for details.
          ISSUE_EOF
          )" \
            --label "bug"
          echo "issue_created=true" >> "$GITHUB_OUTPUT"
      - name: Create fix with Claude
        if: steps.resolve.outputs.execution_name && steps.logs.outputs.logs_available == 'true'
        id: claude_fix
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-opus-4-6
          claude_args: --allowedTools Bash Computer Edit Read Grep Glob Write
          show_full_output: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |-
            A Cloud Run Job execution of our dbt project has failed.
            Execution: ${{ steps.resolve.outputs.execution_name }}
            Here are the execution details and logs:
            ${{ env.CLOUD_RUN_LOGS }}
            Your task:
            1. Analyze the dbt error logs to identify the root cause
            2. Determine which model(s) or configuration caused the failure
            3. Create a fix by modifying the appropriate files
            4. Open a PR from a new branch named fix/cloud-run-${{ github.run_id }}
               with a summary of the failure, what was changed, and how to verify
            5. If you cannot determine a code fix (e.g., infrastructure or
               permissions issue), create a GitHub issue using `gh issue create`
               with the title, error details, and a link to this workflow run:
               ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Check if Claude created a PR or issue
        if: steps.resolve.outputs.execution_name && steps.logs.outputs.logs_available == 'true'
        id: check_output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXEC_NAME: ${{ steps.resolve.outputs.execution_name }}
        run: |
          # Check if a PR was created on a fix/cloud-run-* branch
          PR_COUNT=$(gh pr list --search "Cloud Run" --state open --json number --jq length)
          # Check if an issue was created with this execution name
          ISSUE_COUNT=$(gh issue list --search "$EXEC_NAME" --state open --json number --jq length)
          if [ "$PR_COUNT" -gt 0 ] || [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "Claude created a PR or issue"
            echo "output_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "Claude did not create a PR or issue"
            echo "output_created=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fallback issue (Claude did not create PR or issue)
        if: >-
          steps.resolve.outputs.execution_name
          && steps.logs.outputs.logs_available == 'true'
          && steps.check_output.outputs.output_created == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXEC_NAME: ${{ steps.resolve.outputs.execution_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |-
          gh issue create \
            --title "Cloud Run dbt build failed — $EXEC_NAME" \
            --body "$(cat <<ISSUE_EOF
          ## Cloud Run Job Failure
          **Execution:** \`$EXEC_NAME\`
          **Workflow run:** $RUN_URL

          ### Execution Logs
          \`\`\`
          $(head -200 /tmp/execution_logs.txt)
          \`\`\`

          ### Note
          Claude Code was unable to create a fix automatically. See the workflow
          run for details.
          ISSUE_EOF
          )" \
            --label "bug"
