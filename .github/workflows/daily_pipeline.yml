---
name: Daily Pipeline

on:
  schedule:
    - cron: 0 6 * * *
  workflow_dispatch:

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west4

jobs:
  run:
    name: Execute dbt Build (Cloud Run Job)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Execute Cloud Run Job
        id: execute
        run: |
          # Execute the Cloud Run job and wait for completion.
          # Capture exit code separately so a job failure doesn't skip
          # the status-check steps below.
          EXIT_CODE=0
          gcloud run jobs execute dbt-ai-build \
            --region="${{ env.REGION }}" \
            --wait \
            2>&1 | tee /tmp/execution_output.txt || EXIT_CODE=$?

          # Extract execution name from the latest execution
          EXEC_NAME=$(gcloud run jobs executions list \
            --job=dbt-ai-build \
            --region="${{ env.REGION }}" \
            --sort-by="~createTime" \
            --limit=1 \
            --format="value(metadata.name)")
          echo "execution_name=$EXEC_NAME" >> "$GITHUB_OUTPUT"

          # Check the execution's failed task count rather than the
          # condition type, which is "Completed" for both success and
          # failure.
          FAILED_COUNT=$(gcloud run jobs executions describe "$EXEC_NAME" \
            --region="${{ env.REGION }}" \
            --format="value(status.failedCount)" \
            2>/dev/null) || FAILED_COUNT="unknown"
          echo "failed_count=$FAILED_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$EXIT_CODE" -ne 0 ] || [ "${FAILED_COUNT:-0}" != "0" ]; then
            echo "Cloud Run Job execution failed (exit_code=$EXIT_CODE, failed_count=$FAILED_COUNT)"
            exit 1
          fi
      - name: Trigger fix workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |-
          gh workflow run fix_cloud_run_failure.yml \
            --repo "${{ github.repository }}" \
            -f execution_name="${{ steps.execute.outputs.execution_name }}" \
            -f trigger_source="daily_pipeline"
