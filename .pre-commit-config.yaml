---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=1024
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: dbt-bouncer
        name: dbt-bouncer
        entry: uv run dbt-bouncer --only manifest_checks
        language: system
        pass_filenames: false
        types:
          - yaml
          - sql
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix
        language: system
        types:
          - python
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types:
          - python
      - id: rumdl
        name: rumdl
        entry: uv run rumdl check
        language: system
        types:
          - markdown
        exclude: \.claude/commands/
      - id: sqlfmt
        name: sqlfmt
        entry: uv run sqlfmt
        language: system
        types:
          - sql
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false
        types:
          - python
      - id: yamlfix
        name: yamlfix
        entry: uv run yamlfix
        language: system
        types:
          - yaml
