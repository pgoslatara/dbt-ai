---
name: Claude PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |-
            Review this PR as a senior dbt/analytics engineer. Focus on:
            1. **SQL Style**: Uppercase keywords, snake_case names, one column per line, table aliases in joins, CTEs over subqueries.
            2. **Naming Conventions**: staging=`stg_`, intermediate=`int_`, dimensions=`dim_`, facts=`fct_`.
            3. **Missing Tests**: Every model needs at least one test. Check for `not_null`, `unique` on keys, `accepted_values`, `relationships`.
            4. **Missing Documentation**: Every model and column should have descriptions in YAML.
            5. **Performance**: Flag full table scans, missing incremental strategies on large tables, unnecessary `SELECT *`.
            6. **Business Logic**: Verify computed columns (`is_round_trip`, `trip_duration_minutes`, `day_of_week`) are correct.
            7. **Materializations**: Staging/intermediate should be views, marts should be tables or incremental.
            Be concise. Only comment on issues, not on things that are correct.
      - name: Post review summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |-
          EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --jq '[.[] | select(.body | contains("Claude Code Review"))] | length')
          if [ "$EXISTING" = "0" ]; then
            BODY="## Claude Code Review"
            BODY="${BODY}\n\nNo issues found. Reviewed for SQL style, naming conventions, tests, documentation, performance, business logic, and materializations."
            printf '%b' "$BODY" | gh pr comment "$PR_NUMBER" --body-file -
          fi
